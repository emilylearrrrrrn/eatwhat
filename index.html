<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fff9f2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="今天做啥" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>今天做啥</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div>
          <p class="date-line" id="todayText">今天</p>
          <h1>今天做啥</h1>
        </div>
        <button class="icon-button" id="settingsButton" type="button" aria-label="设置">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" />
            <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.36a1.7 1.7 0 0 0-1 .57V20a2 2 0 0 1-4 0v-.07a1.7 1.7 0 0 0-1-.57 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.64 15a1.7 1.7 0 0 0-.57-1H4a2 2 0 0 1 0-4h.07a1.7 1.7 0 0 0 .57-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.64a1.7 1.7 0 0 0 1-.57V4a2 2 0 0 1 4 0v.07a1.7 1.7 0 0 0 1 .57 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.36 9c.18.36.38.7.57 1H20a2 2 0 0 1 0 4h-.07c-.19.3-.39.64-.57 1Z" />
          </svg>
        </button>
      </header>

      <main>
        <section class="view active" id="view-home" aria-labelledby="homeTitle">
          <div class="hero-panel">
            <div>
              <p class="eyebrow">今晚灵感</p>
              <h2 id="homeTitle">从你做过的菜里挑一道</h2>
            </div>
            <button class="primary-action" id="randomButton" type="button">随机选一道</button>
          </div>

          <div class="stats-grid">
            <article>
              <span id="dishCount">0</span>
              <p>已记录</p>
            </article>
            <article>
              <span id="topRatedCount">0</span>
              <p>高分菜</p>
            </article>
            <article>
              <span id="menuCount">0</span>
              <p>本周菜单</p>
            </article>
          </div>

          <section class="section-block" aria-labelledby="recentTitle">
            <div class="section-heading">
              <h2 id="recentTitle">最近加入</h2>
              <button class="text-button" data-tab-target="library" type="button">查看全部</button>
            </div>
            <div class="horizontal-list" id="recentList"></div>
          </section>
        </section>

        <section class="view" id="view-library" aria-labelledby="libraryTitle">
          <div class="section-heading sticky-heading">
            <h2 id="libraryTitle">菜品库</h2>
            <button class="small-action" id="openAddDish" type="button">添加</button>
          </div>
          <div class="library-shell">
            <aside class="category-sidebar">
              <div class="category-list" id="categoryList"></div>
              <label class="category-add">
                <input id="newCategoryInput" maxlength="12" placeholder="新分类" />
                <button id="addCategoryButton" type="button">+</button>
              </label>
            </aside>
            <div class="library-content">
              <label class="search-field">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m21 21-4.35-4.35" />
                  <circle cx="11" cy="11" r="7" />
                </svg>
                <input id="searchInput" type="search" placeholder="搜索菜名或食材" autocomplete="off" />
              </label>
              <div class="library-sortbar">
                <button class="sort-button active" id="sortRecentButton" type="button">最近添加</button>
                <button class="sort-button" id="sortRatingButton" type="button">评分降序</button>
              </div>
              <div class="dish-grid" id="dishGrid"></div>
            </div>
          </div>
        </section>

        <section class="view" id="view-menu" aria-labelledby="menuTitle">
          <div class="section-heading sticky-heading">
            <h2 id="menuTitle">近一周菜单</h2>
            <button class="small-action" id="generateMenu" type="button">生成</button>
          </div>
          <div class="week-list" id="weekList"></div>
        </section>
      </main>

      <nav class="tabbar" aria-label="主导航">
        <button class="tab active" data-tab="home" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 9-8 9 8" /><path d="M5 10v10h14V10" /><path d="M10 20v-6h4v6" /></svg>
          <span>首页</span>
        </button>
        <button class="tab" data-tab="library" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16" /><path d="M4 12h16" /><path d="M4 19h16" /></svg>
          <span>菜品库</span>
        </button>
        <button class="tab add-tab" id="addTab" type="button" aria-label="添加菜品">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14" /><path d="M5 12h14" /></svg>
        </button>
        <button class="tab" data-tab="menu" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 2v4" /><path d="M16 2v4" /><path d="M3 10h18" /><rect x="3" y="4" width="18" height="18" rx="3" /></svg>
          <span>菜单</span>
        </button>
      </nav>
    </div>

    <dialog class="modal" id="dishDialog">
      <form id="dishForm" method="dialog" class="modal-card">
        <div class="modal-header">
          <h2 id="dishFormTitle">添加菜品</h2>
          <button class="icon-button" type="button" data-close-dialog aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
          </button>
        </div>

        <input type="hidden" id="dishId" />
        <label class="photo-picker" id="photoPicker">
          <input id="photoInput" type="file" accept="image/*" />
          <img id="photoPreview" alt="" />
          <span id="photoHint">选择照片</span>
        </label>
        <div class="photo-adjuster hidden" id="photoAdjuster">
          <label>
            <span>左右</span>
            <input id="photoCropX" type="range" min="0" max="100" value="50" />
          </label>
          <label>
            <span>上下</span>
            <input id="photoCropY" type="range" min="0" max="100" value="50" />
          </label>
          <label>
            <span>放大</span>
            <input id="photoZoom" type="range" min="100" max="220" value="100" />
          </label>
        </div>

        <label class="field">
          <span>菜名</span>
          <input id="nameInput" required maxlength="40" placeholder="比如 番茄鸡蛋" />
        </label>

        <label class="field">
          <span>食材</span>
          <textarea id="ingredientsInput" rows="3" maxlength="300" placeholder="比如 番茄、鸡蛋、葱"></textarea>
        </label>

        <fieldset class="rating-field">
          <legend>评分</legend>
          <div class="rating-buttons" id="ratingButtons"></div>
        </fieldset>

        <fieldset class="tag-field">
          <legend>分类</legend>
          <div class="tag-buttons" id="tagButtons"></div>
          <label class="tag-add">
            <input id="tagInput" maxlength="12" placeholder="新增分类，比如 荤菜" />
            <button id="addTagButton" type="button">添加</button>
          </label>
        </fieldset>

        <label class="field">
          <span>备注</span>
          <textarea id="notesInput" rows="4" maxlength="500" placeholder="下次少放盐，适合配米饭"></textarea>
        </label>

        <div class="modal-actions">
          <button class="danger-button hidden" id="deleteDish" type="button">删除</button>
          <button class="primary-action" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog class="modal" id="detailDialog">
      <article class="modal-card detail-card">
        <div class="modal-header">
          <h2 id="detailName">菜品</h2>
          <button class="icon-button" type="button" data-close-detail aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
          </button>
        </div>
        <button class="detail-photo-button" id="detailPhotoButton" type="button">
          <img class="detail-photo" id="detailPhoto" alt="" />
          <span>查看原图</span>
        </button>
        <div class="detail-meta">
          <span id="detailRating"></span>
          <span id="detailDate"></span>
        </div>
        <div class="detail-section">
          <h3>食材</h3>
          <p id="detailIngredients"></p>
        </div>
        <div class="detail-section">
          <h3>备注</h3>
          <p id="detailNotes"></p>
        </div>
        <button class="primary-action" id="editFromDetail" type="button">编辑</button>
      </article>
    </dialog>

    <dialog class="modal" id="originalPhotoDialog">
      <article class="modal-card original-photo-card">
        <div class="modal-header">
          <h2>原图</h2>
          <button class="icon-button" type="button" data-close-original-photo aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
          </button>
        </div>
        <img id="originalPhotoImage" alt="" />
      </article>
    </dialog>

    <dialog class="modal" id="pickDialog">
      <article class="modal-card pick-card">
        <div class="modal-header">
          <h2>今天可以做</h2>
          <button class="icon-button" type="button" data-close-pick aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
          </button>
        </div>
        <img class="detail-photo" id="pickPhoto" alt="" />
        <h3 id="pickName"></h3>
        <p id="pickIngredients"></p>
        <div class="pick-actions">
          <button class="secondary-action" id="pickAgain" type="button">再换一道</button>
          <button class="primary-action" data-close-pick type="button">就它了</button>
        </div>
      </article>
    </dialog>

    <dialog class="modal" id="settingsDialog">
      <article class="modal-card">
        <div class="modal-header">
          <h2>设置</h2>
          <button class="icon-button" type="button" data-close-settings aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
          </button>
        </div>
        <div class="settings-list">
          <label class="secondary-action import-label">
            更换首页背景图
            <input id="heroImageInput" type="file" accept="image/*" />
          </label>
          <button class="secondary-action" id="resetHeroImage" type="button">恢复默认背景图</button>
          <button class="secondary-action" id="exportData" type="button">导出完整备份</button>
          <label class="secondary-action import-label">
            导入备份
            <input id="importData" type="file" accept="application/json" />
          </label>
          <p class="quiet-text">备份会包含菜品文字、评分、菜单和已保存的照片。照片会写进备份文件，不会单独生成图片文件夹。</p>
        </div>
      </article>
    </dialog>

    <dialog class="modal" id="menuPickerDialog">
      <article class="modal-card">
        <div class="modal-header">
          <h2 id="menuPickerTitle">安排菜单</h2>
          <button class="icon-button" type="button" data-close-menu-picker aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
          </button>
        </div>
        <div class="menu-picker-list" id="menuPickerList"></div>
        <div class="modal-actions">
          <button class="danger-button" id="clearMenuDay" type="button">清空当天</button>
        </div>
      </article>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
